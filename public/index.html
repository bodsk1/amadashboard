<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anteraja App Monthly Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --grid-color: rgba(200, 200, 200, 0.4);
      --grid-size: 40px;
      --line-weight: 1px;
    }
    @font-face {
      font-family: 'Alliance No. 2';
      src: url('/fonts/alliance-no2-regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @keyframes grid-pulse {
      0% {
        --line-weight: 0.5px;
        opacity: 0.7;
      }
      30% {
        --line-weight: 1.2px;
        opacity: 1;
      }
      60% {
        --line-weight: 0.8px;
        opacity: 0.8;
      }
      100% {
        --line-weight: 1.5px;
        opacity: 0.9;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Proxima Nova', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background-color: #ffffff;
      color: #000000;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: linear-gradient(var(--grid-color) var(--line-weight, 1px), transparent var(--line-weight, 1px)),
                        linear-gradient(90deg, var(--grid-color) var(--line-weight, 1px), transparent var(--line-weight, 1px));
      background-size: var(--grid-size) var(--grid-size);
      animation: grid-pulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    #root {
      position: relative;
      background-color: transparent;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
